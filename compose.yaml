services:
  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    ports:
      - '3000:3000'
      - '4317'
      - '4318'
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=library'
      - 'POSTGRES_PASSWORD=admin123'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
